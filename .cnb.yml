main:
  push:
    - imports: https://cnb.build/MornZe-Dev/secrets/-/blob/main/github.yml
      docker:
        image: alpine/git
      stages:
        - script: |
            git remote add github https://${GITHUB_USER}:${GITHUB_TOKEN}@${GITHUB_REPO}
            git push github HEAD:${CNB_BRANCH} --force
